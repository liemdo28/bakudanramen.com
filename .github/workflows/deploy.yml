name: Deploy bakudanramen.com

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Stage deploy files
        run: |
          mkdir -p /tmp/deploy
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='test-results' \
            --exclude='data' \
            --exclude='uploads' \
            --exclude='server' \
            --exclude='qa' \
            --exclude='/stories' \
            --exclude='links-admin' \
            --exclude='Walkthrough' \
            --exclude='*.md' \
            --exclude='package*.json' \
            --exclude='playwright.config*' \
            --exclude='*.sh' \
            --exclude='.htpasswd' \
            --exclude='.env*' \
            ./ /tmp/deploy/

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: /tmp/deploy/
          server-dir: /bakudanramen.com/
          timeout: 60000
          log-level: standard
