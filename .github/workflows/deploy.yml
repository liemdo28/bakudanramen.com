name: Deploy bakudanramen.com

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy via rsync over SSH
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='test-results' \
            --exclude='data' \
            --exclude='uploads' \
            --exclude='server' \
            --exclude='qa' \
            --exclude='stories' \
            --exclude='links-admin' \
            --exclude='Walkthrough' \
            --exclude='*.md' \
            --exclude='package*.json' \
            --exclude='playwright.config*' \
            --exclude='*.sh' \
            --exclude='.htpasswd' \
            --exclude='.env*' \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no -p ${{ secrets.PORT }}" \
            ./ ${{ secrets.USERNAME }}@${{ secrets.HOST }}:${{ secrets.TARGET_DIR }}/
