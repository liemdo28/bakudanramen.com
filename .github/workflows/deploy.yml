name: Deploy to bakudanramen.com

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via rsync (no delete)
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avz --exclude='.git' --exclude='.github' --exclude='wp-config.php'
          path: ./
          remote_path: /home/hoale24new/bakudanramen.com/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_port: ${{ secrets.SSH_PORT }}
