name: Deploy bakudanramen.com

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via SFTP (lftp)
        env:
          SFTP_HOST: ${{ secrets.HOST }}
          SFTP_USER: ${{ secrets.USERNAME }}
          SFTP_PASS: ${{ secrets.PASSWORD }}
          SFTP_TARGET: ${{ secrets.TARGET_DIR }}
        run: |
          lftp -u "$SFTP_USER","$SFTP_PASS" sftp://$SFTP_HOST \
            -e "set sftp:auto-confirm yes; \
                set net:max-retries 3; \
                set net:timeout 60; \
                mirror -R --only-newer --parallel=4 \
                  --exclude-glob .git \
                  --exclude-glob .github \
                  --exclude-glob node_modules \
                  --exclude-glob test-results \
                  --exclude-glob data \
                  --exclude-glob uploads \
                  --exclude-glob server \
                  --exclude-glob qa \
                  --exclude-glob stories \
                  --exclude-glob links-admin \
                  --exclude '\.md$' \
                  --exclude 'package.*\.json$' \
                  --exclude '\.ts$' \
                  --exclude '\.sh$' \
                  --exclude '^\.htpasswd$' \
                  . $SFTP_TARGET; \
                bye"
